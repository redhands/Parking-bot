# Font: Noto Sans
name: Parking Bot Alert

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check_parking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run Parking Monitor
        env:
          PARKING_BOT_TOKEN: ${{ secrets.PARKING_BOT_TOKEN }}
          PARKING_CHAT_ID: ${{ secrets.PARKING_CHAT_ID }}
        run: python parking_monitor.py
